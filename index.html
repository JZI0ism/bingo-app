<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  font-family:sans-serif;
  text-align:center;
  background:#fff7f9;
}

.grid{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:8px;
  max-width:400px;
  margin:30px auto;
}

.cell{
  aspect-ratio:1;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
}
.cell img{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<h2>My Bingo</h2>
<div class="grid" id="grid"></div>

<script>
const items = Array(25).fill("square.png");
const grid = document.getElementById("grid");

items.forEach((imgSrc,index)=>{
  const cell = document.createElement("div");
  cell.className="cell";

  const img = document.createElement("img");
  img.src = localStorage.getItem("cell"+index) || "square.png";

  cell.appendChild(img);

  cell.onclick=()=>{
    if(img.src.includes("square")){
      img.src="checked.png";
      localStorage.setItem("cell"+index,"checked.png");
    }else{
      img.src="square.png";
      localStorage.setItem("cell"+index,"square.png");
    }
  };

  grid.appendChild(cell);
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
